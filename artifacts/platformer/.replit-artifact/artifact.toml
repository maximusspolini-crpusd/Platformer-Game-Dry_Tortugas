kind = "web"
previewPath = "/"
title = "2D Platformer"
version = "1.0.0"
id = "artifacts/platformer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23841

[services.development]
run = "pnpm --filter @workspace/platformer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/platformer", "run", "build" ]
publicDir = "artifacts/platformer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23841"
BASE_PATH = "/"
